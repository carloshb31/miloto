name: Actualizar resultados MiLoto

on:
  schedule:
    # Lunes, Martes, Miercoles, Jueves, Viernes a las 3:30 AM UTC = 10:30 PM Colombia
    - cron: '30 5 * * 1,2,3,4,5,6'
  workflow_dispatch: # permite correrlo manualmente desde GitHub

concurrency:
  group: actualizar-miloto
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "MiLoto Bot"
          git config user.email "bot@miloto.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "No hay cambios para commitear"
          else
            git commit -m "🎱 Actualizar resultados MiLoto $(date +'%Y-%m-%d')"
            git fetch origin main
            git merge origin/main --no-edit -X ours
            git push
          fi
