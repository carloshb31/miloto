name: Actualizar resultados MiLoto

on:
  schedule:
    # Lunes, Martes, Jueves, Viernes a las 3:30 AM UTC = 10:30 PM Colombia
    - cron: '30 3 * * 1,2,4,5'
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "MiLoto Bot"
          git config user.email "bot@miloto.com"
          git add data.json
          git diff --staged --quiet || git commit -m "🎱 Actualizar resultados MiLoto $(date +'%Y-%m-%d')"
          git push
